{{- /* Omit when creds unset so `helm lint` passes with chart defaults; set registry in your values file. */}}
{{- if and .Values.registry.server .Values.registry.username .Values.registry.password }}
{{- $server := .Values.registry.server }}
{{- $user := .Values.registry.username }}
{{- $pass := .Values.registry.password }}
{{- $email := .Values.registry.email }}
{{- $auth := dict "username" $user "password" $pass "email" $email "auth" (printf "%s:%s" $user $pass | b64enc) }}
{{- $dock := dict $server $auth }}
{{- $doc := dict "auths" $dock }}
{{- $op := .Values.productNamespaces.operator }}
{{- $mod := .Values.productNamespaces.moderator }}
{{- range tuple $op $mod }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Values.registry.secretName }}
  namespace: {{ . }}
  labels:
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/name: {{ include "f5-ai-security.name" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ $doc | toJson | quote }}
{{- end }}
{{- end }}
